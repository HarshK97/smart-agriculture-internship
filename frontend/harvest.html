<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AgriSmart Market Updates — Check daily mandi prices, price trends, and best time to sell your crops.">
  <title>Market Updates — AgriSmart</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo"><div class="logo-icon"><i class="fas fa-leaf"></i></div><span class="logo-text" id="navBrand">AgriSmart</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link" id="navHome"><i class="fas fa-home"></i> Home</a>
        <a href="planting.html" class="nav-link" id="navPlanting"><i class="fas fa-seedling"></i> Planting</a>
        <a href="irrigation.html" class="nav-link" id="navIrrigation"><i class="fas fa-water"></i> Irrigation</a>
        <a href="harvest.html" class="nav-link active" id="navHarvest"><i class="fas fa-shopping-cart"></i> Market</a>
      </div>
      <div class="nav-right">
        <button class="notification-btn"><i class="fas fa-bell"></i><span class="notification-badge">2</span></button>
        <a href="profile.html" class="avatar-ring"><div class="avatar-inner"><i class="fas fa-user-circle"></i></div></a>
      </div>
    </div>
  </nav>

  <div class="container py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6" style="flex-wrap:wrap;gap:.5rem;">
      <div class="flex items-center gap-4">
        <a href="index.html" class="notification-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-2xl font-bold text-dark flex items-center gap-2"><i class="fas fa-shopping-cart text-green-900"></i> <span id="pageTitle">Market Updates</span></h1>
      </div>
      <div style="background:#E8F0E8;padding:.5rem 1rem;border-radius:9999px;font-size:.875rem;font-weight:500;color:#1B5E20;" id="userLoc">📍 Dindori</div>
    </div>

    <!-- Crop Selection -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold text-dark mb-3" id="selectCropTitle">Select Crop</h2>
      <div class="grid gap-3" id="cropGrid" style="grid-template-columns:repeat(auto-fill,minmax(100px,1fr));"></div>
    </div>

    <!-- Mandi Prices -->
    <div class="card mb-6">
      <h2 class="text-lg font-bold text-dark mb-4 flex items-center gap-2"><i class="fas fa-tags text-green-900"></i> <span id="mandiTitle">Today's Mandi Prices</span></h2>
      <div class="grid gap-3" id="priceCards" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr));"></div>
    </div>

    <!-- Price Trend Chart -->
    <div class="card mb-6">
      <h2 class="text-lg font-bold text-dark mb-4 flex items-center gap-2"><i class="fas fa-chart-line text-green-900"></i> <span id="trendTitle">7-Day Price Trend</span></h2>
      <div class="chart-container"><canvas id="trendChart"></canvas></div>
    </div>

    <!-- Best Time to Sell -->
    <div class="card-green mb-6" id="sellCard"></div>

    <!-- Market Comparison -->
    <div class="card mb-6">
      <h2 class="text-lg font-bold text-dark mb-4 flex items-center gap-2"><i class="fas fa-table text-green-900"></i> <span id="compTitle">Market Comparison</span></h2>
      <div class="overflow-x-auto"><table class="data-table" id="compTable"></table></div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <div class="flex">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span id="bnHome">Home</span></a>
        <a href="planting.html" class="bottom-nav-item"><i class="fas fa-seedling"></i><span id="bnPlanting">Planting</span></a>
        <a href="irrigation.html" class="bottom-nav-item"><i class="fas fa-water"></i><span id="bnIrrigation">Irrigation</span></a>
        <a href="harvest.html" class="bottom-nav-item active"><i class="fas fa-shopping-cart"></i><span id="bnHarvest">Market</span></a>
        <a href="profile.html" class="bottom-nav-item"><i class="fas fa-user-circle"></i><span id="bnProfile">Profile</span></a>
      </div>
    </nav>
  </div>

  <script src="js/translations.js"></script>
  <script src="js/language.js"></script>
  <script src="js/api.js"></script>
  <script src="js/harvest.js"></script>
</body>
</html>
