<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Change your AgriSmart account password.">
  <title>Change Password — AgriSmart</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width:28rem;">
      <!-- Header -->
      <div style="background:linear-gradient(to right,#1B5E20,#4CAF50);padding:1.5rem;color:#fff;display:flex;align-items:center;justify-content:center;position:relative;">
        <a href="profile.html" style="position:absolute;left:1rem;padding:.5rem;border-radius:50%;color:#fff;" id="backBtn"><i class="fas fa-arrow-left"></i></a>
        <div class="flex items-center gap-2">
          <i class="fas fa-lock" style="font-size:1.25rem;"></i>
          <h1 class="text-xl font-bold" id="pageTitle">Change Password</h1>
        </div>
      </div>
      <!-- Content -->
      <div class="auth-body">
        <div id="successView" class="hidden success-box">
          <i class="fas fa-check-circle" style="font-size:3.5rem;color:#4CAF50;margin-bottom:1rem;"></i>
          <h2 class="text-2xl font-bold text-dark mb-2" id="successTitle">Password Updated!</h2>
          <p class="text-muted" id="successMsg">Redirecting to profile...</p>
        </div>
        <form id="passwordForm" class="space-y-5">
          <div id="errorBox" class="error-box hidden" style="margin-bottom:1rem;"></div>
          <div class="form-group">
            <label class="form-label"><i class="fas fa-key"></i> <span id="lbl1">Current Password</span></label>
            <input type="password" id="currentPassword" class="form-input" placeholder="••••••••">
          </div>
          <div class="form-group" style="margin-top:1rem;">
            <label class="form-label"><i class="fas fa-lock"></i> <span id="lbl2">New Password</span></label>
            <input type="password" id="newPassword" class="form-input" placeholder="••••••••">
          </div>
          <div class="form-group" style="margin-top:1rem;">
            <label class="form-label"><i class="fas fa-check-circle"></i> <span id="lbl3">Confirm New Password</span></label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-green btn-full btn-lg" style="margin-top:1.5rem;" id="saveBtn">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
  <script src="js/translations.js"></script>
  <script src="js/language.js"></script>
  <script src="js/edit-password.js"></script>
</body>
</html>
