<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AgriSmart Planting Advisor — Seasonal planting calendar, weather risk alerts, soil health metrics, and crop tips.">
  <title>Planting Insights — AgriSmart</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo"><div class="logo-icon"><i class="fas fa-leaf"></i></div><span class="logo-text" id="navBrand">AgriSmart</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link" id="navHome"><i class="fas fa-home"></i> Home</a>
        <a href="planting.html" class="nav-link active" id="navPlanting"><i class="fas fa-seedling"></i> Planting</a>
        <a href="irrigation.html" class="nav-link" id="navIrrigation"><i class="fas fa-water"></i> Irrigation</a>
        <a href="harvest.html" class="nav-link" id="navHarvest"><i class="fas fa-shopping-cart"></i> Market</a>
      </div>
      <div class="nav-right">
        <button class="notification-btn"><i class="fas fa-bell"></i><span class="notification-badge">2</span></button>
        <a href="profile.html" class="avatar-ring"><div class="avatar-inner"><i class="fas fa-user-circle"></i></div></a>
      </div>
    </div>
  </nav>

  <div class="container py-6">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-6">
      <a href="index.html" class="notification-btn"><i class="fas fa-arrow-left"></i></a>
      <h1 class="text-2xl font-bold text-dark flex items-center gap-2"><i class="fas fa-seedling text-green-900"></i> <span id="pageTitle">Planting Advisor</span></h1>
    </div>

    <!-- Season Selector -->
    <div class="card mb-6">
      <label class="form-label"><i class="fas fa-calendar-alt text-green-900"></i> <span id="seasonLabel">Season</span></label>
      <select class="form-select" id="seasonSelect"></select>
    </div>

    <!-- Crop Grid -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold text-dark mb-3" id="cropGridTitle">Select Crop</h2>
      <div class="grid gap-3" id="cropGrid" style="grid-template-columns:repeat(3,1fr);"></div>
    </div>

    <!-- Seasonal Calendar -->
    <div class="card mb-6" id="calendarSection"></div>

    <!-- Best Planting Window -->
    <div class="card-green mb-6" id="plantingWindow"></div>

    <!-- Weather Risk Alerts -->
    <div class="card mb-6" id="riskSection"></div>

    <!-- Tips & Soil -->
    <div class="grid gap-6 mb-6" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));">
      <div class="card" id="tipsSection"></div>
      <div class="card" id="soilSection"></div>
    </div>

    <!-- Decision Card -->
    <div class="card-amber mb-6" id="decisionSection"></div>

    <!-- Recent Activities -->
    <div class="card mb-6" id="recentSection"></div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <div class="flex">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span id="bnHome">Home</span></a>
        <a href="planting.html" class="bottom-nav-item active"><i class="fas fa-seedling"></i><span id="bnPlanting">Planting</span></a>
        <a href="irrigation.html" class="bottom-nav-item"><i class="fas fa-water"></i><span id="bnIrrigation">Irrigation</span></a>
        <a href="harvest.html" class="bottom-nav-item"><i class="fas fa-shopping-cart"></i><span id="bnHarvest">Market</span></a>
        <a href="profile.html" class="bottom-nav-item"><i class="fas fa-user-circle"></i><span id="bnProfile">Profile</span></a>
      </div>
    </nav>
  </div>

  <script src="js/translations.js"></script>
  <script src="js/language.js"></script>
  <script src="js/api.js"></script>
  <script src="js/planting.js"></script>
</body>
</html>
