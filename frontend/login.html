<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your AgriSmart dashboard for smart agriculture insights.">
  <title>Login — AgriSmart</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-header-content">
          <div class="auth-logo"><i class="fas fa-leaf"></i></div>
          <h1 class="text-2xl font-bold" style="color:#fff;margin-bottom:.25rem;">Welcome Back</h1>
          <p class="text-sm text-white-90">Sign in to your AgriSmart dashboard</p>
        </div>
      </div>
      <div class="auth-body">
        <form id="loginForm" class="space-y-5">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" required class="form-input" placeholder="farmer@agrismart.com">
          </div>
          <div class="form-group" style="margin-top:1rem;">
            <label class="form-label"><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" required class="form-input" placeholder="••••••••">
          </div>
          <div class="flex justify-end mt-2">
            <a href="#" class="text-sm text-green-900 font-medium" style="text-decoration:none;">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-green btn-full btn-lg" style="margin-top:1.5rem;">Sign In</button>
        </form>
        <p class="text-center text-muted text-sm" style="margin-top:2rem;padding-bottom:.5rem;">
          Don't have an account? <a href="signup.html" class="text-green-900 font-bold" style="text-decoration:none;">Sign up here</a>
        </p>
      </div>
    </div>
  </div>
  <script src="js/translations.js"></script>
  <script src="js/language.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
